<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline — iClub</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f8f7f9;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 2rem;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
            max-width: 400px;
        }

        .icon {
            width: 80px;
            height: 80px;
            background: #fef3c7;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
        }

        h1 {
            font-size: 1.75rem;
            font-weight: 700;
            color: #662f91;
        }

        p {
            color: #737373;
            line-height: 1.6;
        }

        p.hint {
            font-size: 0.85rem;
            color: #a3a3a3;
        }

        button {
            margin-top: 0.5rem;
            padding: 0.75rem 2rem;
            background: linear-gradient(135deg, #662f91, #7a47a3);
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
        }

        button:hover {
            opacity: 0.9;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="icon">📡</div>
        <h1>You are offline</h1>
        <p>
            No internet connection detected.
            Please check your connection and try again.
        </p>
        <p class="hint">
            Some pages you have visited recently may still be
            available — try navigating back.
        </p>
        <button onclick="window.location.reload()">
            Try again
        </button>
    </div>
</body>

</html>
