name: Deploy to Back4App

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-backend-image:
    name: Build Backend Docker Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (backend)
        run: |
          docker build -t backend-test -f backend/Dockerfile .

      # If Back4App requires pushing to a registry, add steps here.
      # Otherwise, Back4App will build from the repo or Dockerfile directly.

      - name: Show Docker images
        run: docker images
