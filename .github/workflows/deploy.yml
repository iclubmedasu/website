name: Deploy — Supabase + Hugging Face + Netlify

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # ─────────────────────────────────────────────────────────────
  # JOB 1 — Run Prisma migrations against Supabase
  # ─────────────────────────────────────────────────────────────
  migrate:
    name: Run Database Migrations
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install backend dependencies
        run: pnpm install --frozen-lockfile --filter backend...

      - name: Generate Prisma client
        run: pnpm --filter backend exec prisma generate

      - name: Run Prisma migrations
        working-directory: backend
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  # ─────────────────────────────────────────────────────────────
  # JOB 2 — Upload to Hugging Face Space
  # ─────────────────────────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend to Hugging Face
    runs-on: ubuntu-latest
    needs: migrate

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install huggingface_hub
        # Older versions always call create_repo internally in upload_large_folder
        # without passing space_sdk, which crashes even if the Space already exists.
        # v0.26.0 fixed this. Pin to that version or newer.
        run: pip install "huggingface_hub[hf_xet]>=0.26.0"

      - name: Upload to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE: ${{ secrets.HF_SPACE }}
        run: |
          python - <<'EOF'
          import os
          from huggingface_hub import HfApi

          api = HfApi(token=os.environ["HF_TOKEN"])
          repo_id = os.environ["HF_SPACE"]

          api.upload_large_folder(
              folder_path=".",
              repo_id=repo_id,
              repo_type="space",
              ignore_patterns=[
                  # Version control
                  ".git",
                  ".github",
                  # Frontend packages
                  "members-portal",
                  "public-website",
                  # Shared packages source
                  "packages",
                  # Dependencies and caches
                  "node_modules",
                  "*/node_modules",
                  "**/node_modules",
                  ".cache",
                  "*/.cache",
                  "**/.cache",
                  # Binary assets
                  "*.pdf",
                  "*.png",
                  "*.jpg",
                  "*.jpeg",
                  "*.gif",
                  "*.ico",
                  "*.webp",
                  # Build artifacts
                  "*/dist",
                  "**/dist",
                  # Test output
                  "coverage",
                  "playwright-report",
                  "test-results",
                  # Environment files
                  ".env",
                  ".env.*",
                  # Misc
                  "__pycache__",
                  "**/__pycache__",
                  "*.log",
                  "*.tsbuildinfo",
              ],
          )
          print("Upload complete")
          EOF

