name: Deploy — Supabase + Hugging Face

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # ─────────────────────────────────────────────────────────────
  # JOB 1 — Run Prisma migrations against Supabase
  # ─────────────────────────────────────────────────────────────
  migrate:
    name: Run Database Migrations
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install backend dependencies
        run: pnpm install --frozen-lockfile --filter backend...

      - name: Generate Prisma client
        run: pnpm --filter backend exec prisma generate

      - name: Run Prisma migrations
        run: pnpm --filter backend prisma:deploy
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Seed support content
        run: pnpm --filter backend seed:support-content
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  # ─────────────────────────────────────────────────────────────
  # JOB 2 — Upload to Hugging Face Space
  # Uses huggingface_hub with Xet support — handles binary files
  # correctly and skips all frontend/asset files automatically.
  #
  # Required GitHub secrets:
  #   HF_TOKEN  — Hugging Face User Access Token (write access)
  #   HF_SPACE  — Space path e.g. "your-username/iclub-backend"
  # ─────────────────────────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend to Hugging Face
    runs-on: ubuntu-latest
    needs: migrate

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Clean workspace before upload
        run: |
          # Remove frontend packages — not needed by HF
          # NOTE: packages/shared is kept — Dockerfile depends on it
          rm -rf members-portal public-website

          # Backend tests are not needed in the HF Docker image
          rm -rf backend/__tests__

          # Remove all node_modules and cache folders
          find . -type d -name "node_modules" -exec rm -rf {} + 2>/dev/null || true
          find . -type d -name ".cache" -exec rm -rf {} + 2>/dev/null || true
          find . -type d -name "__pycache__" -exec rm -rf {} + 2>/dev/null || true

          # Remove binary assets — backend doesn't need them
          find . -type f \( \
            -name "*.png" -o -name "*.jpg" -o -name "*.jpeg" \
            -o -name "*.gif" -o -name "*.ico" -o -name "*.webp" \
            -o -name "*.pdf" \
          \) -delete

          # Remove test and build output
          find . -type d -name "dist" -exec rm -rf {} + 2>/dev/null || true
          find . -type d -name "coverage" -exec rm -rf {} + 2>/dev/null || true
          find . -type d -name "playwright-report" -exec rm -rf {} + 2>/dev/null || true
          find . -type d -name "test-results" -exec rm -rf {} + 2>/dev/null || true

          echo "Workspace cleaned. Remaining files:"
          find . -not -path "./.git/*" -type f | head -50

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install huggingface_hub with Xet support
        run: pip install "huggingface_hub[hf_xet]"

      - name: Upload to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE: ${{ secrets.HF_SPACE }}
        run: |
          python - <<'EOF'
          import os
          from huggingface_hub import HfApi

          api = HfApi(token=os.environ["HF_TOKEN"])
          repo_id = os.environ["HF_SPACE"]

          # Ensure the Space exists (no-op if it already does)
          api.create_repo(
              repo_id=repo_id,
              repo_type="space",
              space_sdk="docker",
              exist_ok=True,
          )

          api.upload_folder(
              folder_path=".",
              repo_id=repo_id,
              repo_type="space",
              ignore_patterns=[
                  ".git",
                  ".github",
                  ".env",
                  ".env.*",
                  "*.log",
                  "*.tsbuildinfo",
              ],
              delete_patterns=[
                  "backend/__tests__/**",
                  "members-portal/**",
                  "public-website/**",
              ],
              commit_message="Deploy from GitHub Actions",
          )
          print("Upload complete")
          EOF

  # ─────────────────────────────────────────────────────────────
  # JOB 3 — Deploy frontend to Hugging Face Space
  #
  # Required GitHub secrets:
  #   HF_TOKEN           — Hugging Face User Access Token (write access)
  #   HF_FRONTEND_SPACE  — Space path e.g. "iclubmedasu/members-portal"
  # ─────────────────────────────────────────────────────────────
  deploy-frontend-hf:
    name: Deploy Frontend to Hugging Face
    runs-on: ubuntu-latest
    needs: migrate

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare frontend Space files
        run: |
          cp members-portal/Dockerfile Dockerfile
          cp members-portal/README.hf.md README.md

      - name: Clean workspace before upload
        run: |
          # Backend and public-website are not needed by the frontend HF Space
          rm -rf backend public-website

          # Remove all node_modules and cache folders
          find . -type d -name "node_modules" -exec rm -rf {} + 2>/dev/null || true
          find . -type d -name ".next" -exec rm -rf {} + 2>/dev/null || true
          find . -type d -name ".cache" -exec rm -rf {} + 2>/dev/null || true

          # Remove test and build output
          find . -type d -name "coverage" -exec rm -rf {} + 2>/dev/null || true
          find . -type d -name "playwright-report" -exec rm -rf {} + 2>/dev/null || true
          find . -type d -name "test-results" -exec rm -rf {} + 2>/dev/null || true

          echo "Workspace cleaned. Remaining files:"
          find . -not -path "./.git/*" -type f | head -50

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install huggingface_hub with Xet support
        run: pip install "huggingface_hub[hf_xet]"

      - name: Upload to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_FRONTEND_SPACE: ${{ secrets.HF_FRONTEND_SPACE }}
        run: |
          python - <<'EOF'
          import os
          from huggingface_hub import HfApi

          api = HfApi(token=os.environ["HF_TOKEN"])
          repo_id = os.environ["HF_FRONTEND_SPACE"]

          api.create_repo(
              repo_id=repo_id,
              repo_type="space",
              space_sdk="docker",
              exist_ok=True,
          )

          api.upload_folder(
              folder_path=".",
              repo_id=repo_id,
              repo_type="space",
              ignore_patterns=[
                  ".git",
                  ".github",
                  ".env",
                  ".env.*",
                  "*.log",
                  "*.tsbuildinfo",
              ],
              delete_patterns=[
                  "backend/**",
                  "public-website/**",
              ],
              commit_message="Deploy frontend from GitHub Actions",
          )
          print("Frontend upload complete")
          EOF

  # ─────────────────────────────────────────────────────────────
  # JOB 4 — Deploy public website to Hugging Face Space
  #
  # Required GitHub secrets:
  #   HF_TOKEN           — Hugging Face User Access Token (write access)
  #   HF_PUBLIC_SPACE    — Space path e.g. "iclubmedasu/public-website"
  # ─────────────────────────────────────────────────────────────
  deploy-public-website-hf:
    name: Deploy Public Website to Hugging Face
    runs-on: ubuntu-latest
    needs: migrate

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare public website Space files
        run: |
          cp public-website/Dockerfile Dockerfile
          cp public-website/README.hf.md README.md

      - name: Clean workspace before upload
        run: |
          # Backend and members-portal are not needed by the public website HF Space
          rm -rf backend members-portal

          # Remove all node_modules and cache folders
          find . -type d -name "node_modules" -exec rm -rf {} + 2>/dev/null || true
          find . -type d -name ".next" -exec rm -rf {} + 2>/dev/null || true
          find . -type d -name ".cache" -exec rm -rf {} + 2>/dev/null || true

          # Remove test and build output
          find . -type d -name "coverage" -exec rm -rf {} + 2>/dev/null || true
          find . -type d -name "playwright-report" -exec rm -rf {} + 2>/dev/null || true
          find . -type d -name "test-results" -exec rm -rf {} + 2>/dev/null || true

          echo "Workspace cleaned. Remaining files:"
          find . -not -path "./.git/*" -type f | head -50

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install huggingface_hub with Xet support
        run: pip install "huggingface_hub[hf_xet]"

      - name: Upload to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_PUBLIC_SPACE: ${{ secrets.HF_PUBLIC_SPACE }}
        run: |
          python - <<'EOF'
          import os
          from huggingface_hub import HfApi

          api = HfApi(token=os.environ["HF_TOKEN"])
          repo_id = os.environ["HF_PUBLIC_SPACE"]

          api.create_repo(
              repo_id=repo_id,
              repo_type="space",
              space_sdk="docker",
              exist_ok=True,
          )

          api.upload_folder(
              folder_path=".",
              repo_id=repo_id,
              repo_type="space",
              ignore_patterns=[
                  ".git",
                  ".github",
                  ".env",
                  ".env.*",
                  "*.log",
                  "*.tsbuildinfo",
              ],
              delete_patterns=[
                  "backend/**",
                  "members-portal/**",
              ],
              commit_message="Deploy public website from GitHub Actions",
          )
          print("Public website upload complete")
          EOF
