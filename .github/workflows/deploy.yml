name: Deploy To Azure App Service

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  REGISTRY: ${{ secrets.AZURE_CONTAINER_REGISTRY_LOGIN_SERVER }}
  BACKEND_IMAGE_NAME: iclub-backend
  PORTAL_IMAGE_NAME: iclub-members-portal

jobs:
  build-and-push-images:
    name: Build And Push Container Images
    runs-on: ubuntu-latest
    outputs:
      backend-image: ${{ steps.images.outputs.backend_image }}
      portal-image: ${{ steps.images.outputs.portal_image }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image tags
        id: images
        run: |
          echo "backend_image=${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE_NAME }}:${{ github.sha }}" >> "$GITHUB_OUTPUT"
          echo "portal_image=${{ env.REGISTRY }}/${{ env.PORTAL_IMAGE_NAME }}:${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.AZURE_CONTAINER_REGISTRY_USERNAME }}
          password: ${{ secrets.AZURE_CONTAINER_REGISTRY_PASSWORD }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: |
            ${{ steps.images.outputs.backend_image }}
            ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE_NAME }}:latest

      - name: Build and push members-portal image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: members-portal/Dockerfile
          push: true
          tags: |
            ${{ steps.images.outputs.portal_image }}
            ${{ env.REGISTRY }}/${{ env.PORTAL_IMAGE_NAME }}:latest

  deploy-backend:
    name: Deploy Backend App Service
    runs-on: ubuntu-latest
    needs: build-and-push-images

    steps:
      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy backend container
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_BACKEND_APP_NAME }}
          images: ${{ needs.build-and-push-images.outputs.backend-image }}

  deploy-members-portal:
    name: Deploy Members Portal App Service
    runs-on: ubuntu-latest
    needs: [build-and-push-images, deploy-backend]

    steps:
      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy members-portal container
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_PORTAL_APP_NAME }}
          images: ${{ needs.build-and-push-images.outputs.portal-image }}
